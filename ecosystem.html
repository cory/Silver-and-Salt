<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver & Salt Capital — Network Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
/* ─── NUMERAL OVERRIDE (Brand Rule 6) ───────────────────────────
   Digits 0-9 render in Cormorant Infant, never Cormorant Garamond.
   Re-sources the digit unicode range only, so anywhere Cormorant
   Garamond is set, digits automatically swap to Infant. Mirrors the
   block in styles.css §0. See BRAND.md / _reference/brand-standards.md. */
@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:300; font-display:swap; src:url(https://fonts.gstatic.com/s/cormorantinfant/v22/HhyPU44g9vKiM1sORYSiWeAsLN997_cV2RkDTq8.woff2) format('woff2'); unicode-range:U+0030-0039; }
@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:400; font-display:swap; src:url(https://fonts.gstatic.com/s/cormorantinfant/v22/HhyPU44g9vKiM1sORYSiWeAsLN997_cV2RkDTq8.woff2) format('woff2'); unicode-range:U+0030-0039; }
@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:600; font-display:swap; src:url(https://fonts.gstatic.com/s/cormorantinfant/v22/HhyPU44g9vKiM1sORYSiWeAsLN997_cV2RkDTq8.woff2) format('woff2'); unicode-range:U+0030-0039; }
@font-face { font-family:'Cormorant Garamond'; font-style:italic; font-weight:400; font-display:swap; src:url(https://fonts.gstatic.com/s/cormorantinfant/v22/HhyJU44g9vKiM1sORYSiWeAsLN997_Il2xMEbK0UPg.woff2) format('woff2'); unicode-range:U+0030-0039; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream:     #FBF8F2;
  --sand:      #F4EFE6;
  --moss:      #2F3E34;
  --moss-light:#4A5E50;
  --sage:      #7E8E84;
  --rust:      #D16B4F;
  --teal:      #1A8F7D;
  --warm:      #C4A47E;
  --plum:      #8B5E83;
  --line:      rgba(47,62,52,0.10);
  /* relationship health */
  --h-thriving: #2A8C5A;
  --h-warm:     #C9A227;
  --h-cooling:  #D16B4F;
  --h-dormant:  #9aa39b;
}
body { background: var(--cream); font-family: 'Satoshi', sans-serif; color: var(--moss); -webkit-font-smoothing: antialiased; }
.brand-amp { font-family: 'Cormorant Garamond', serif; font-style: normal; }

/* ── HEADER ── */
.eco-header { background: var(--moss); padding: 26px 40px 22px; position: relative; overflow: hidden; }
.eco-header::before { content:''; position:absolute; top:-60px; right:-60px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,0.03); }
.eco-header-inner { display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1; flex-wrap:wrap; gap:16px; }
.eco-eyebrow { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--sage); margin-bottom:6px; }
.eco-title { font-family:'Cormorant Garamond', serif; font-size:32px; font-weight:600; color:var(--cream); line-height:1.1; }
.eco-title span { color: var(--rust); }
.eco-subtitle { font-size:12px; color:var(--sage); margin-top:6px; max-width:520px; line-height:1.5; }
.eco-back { font-size:12px; color:var(--cream); text-decoration:none; opacity:0.85; }
.eco-back:hover { opacity:1; }

/* ── STATS STRIP ── */
.eco-stats { display:flex; gap:28px; padding:18px 40px; background:var(--sand); border-bottom:1px solid var(--line); flex-wrap:wrap; }
.eco-stat .num { font-family:'Cormorant Garamond', serif; font-size:26px; font-weight:600; color:var(--moss); line-height:1; }
.eco-stat .lbl { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--sage); margin-top:4px; }

/* ── CONTROLS ── */
.eco-controls { padding:22px 40px 10px; display:flex; flex-direction:column; gap:14px; }
.eco-search { width:100%; max-width:440px; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-family:'Satoshi',sans-serif; font-size:14px; color:var(--moss); background:#fff; }
.eco-search:focus { outline:none; border-color:var(--sage); }
.filter-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--sage); margin-right:4px; min-width:78px; }
.chip { font-size:12px; padding:5px 12px; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--moss-light); cursor:pointer; transition:all .15s; font-family:'Satoshi',sans-serif; }
.chip:hover { border-color:var(--sage); }
.chip.active { background:var(--moss); color:var(--cream); border-color:var(--moss); }
.chip.comm-monarch.active { background:var(--plum); border-color:var(--plum); }
.chip.comm-silver-salt.active { background:var(--teal); border-color:var(--teal); }

/* ── GRID ── */
.eco-grid { padding:18px 40px 60px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.p-card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; position:relative; transition:box-shadow .15s, transform .15s; }
.p-card:hover { box-shadow:0 8px 24px rgba(47,62,52,0.08); transform:translateY(-2px); }
.p-top { display:flex; align-items:flex-start; gap:12px; }
.p-avatar { width:46px; height:46px; border-radius:50%; background:var(--sand); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--moss-light); overflow:hidden; }
.p-avatar img { width:100%; height:100%; object-fit:cover; }
.p-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; line-height:1.1; }
.p-role { font-size:12px; color:var(--moss-light); margin-top:2px; }
.p-loc { font-size:11px; color:var(--sage); margin-top:3px; }
.p-health { position:absolute; top:16px; right:16px; width:9px; height:9px; border-radius:50%; }
.p-health[data-h="thriving"]{ background:var(--h-thriving);} .p-health[data-h="warm"]{ background:var(--h-warm);}
.p-health[data-h="cooling"]{ background:var(--h-cooling);} .p-health[data-h="dormant"]{ background:var(--h-dormant);}
.p-comms { display:flex; gap:5px; margin-top:12px; }
.p-comm { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; padding:3px 8px; border-radius:5px; font-weight:700; }
.p-comm.monarch { background:rgba(139,94,131,0.12); color:var(--plum); }
.p-comm.silver-salt { background:rgba(26,143,125,0.12); color:var(--teal); }
.p-comm.prospect { background:rgba(154,163,155,0.15); color:var(--sage); }
.p-tags { margin-top:12px; display:flex; flex-wrap:wrap; gap:5px; }
.tag { font-size:10px; padding:3px 8px; border-radius:6px; background:var(--sand); color:var(--moss-light); }
.tag.skill { background:rgba(126,142,132,0.16); }
.tag.interest { background:rgba(196,164,126,0.18); color:#8a6d44; }
.p-notes { font-size:12px; color:var(--moss-light); margin-top:12px; line-height:1.45; border-top:1px solid var(--line); padding-top:10px; }
.p-meta { font-size:11px; color:var(--sage); margin-top:8px; }
.p-links { margin-top:10px; }
.p-links a { font-size:11px; color:var(--teal); text-decoration:none; }
.p-links a:hover { text-decoration:underline; }
.result-count { font-size:11px; color:var(--sage); margin-top:4px; }
.tag.focus { background:rgba(139,94,131,0.12); color:var(--plum); }
.p-relevance { display:inline-block; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:5px; font-weight:700; margin-left:6px; }
.p-relevance.high { background:rgba(42,140,90,0.14); color:var(--h-thriving); }
.p-relevance.medium { background:rgba(201,162,39,0.16); color:#9a7d12; }
.p-via { font-size:11px; color:var(--sage); margin-top:8px; }
.p-pipeline { font-size:11px; margin-top:10px; padding:8px 10px; border-radius:8px; background:var(--sand); color:var(--moss-light); line-height:1.4; }
.p-pipeline .pl-action { font-weight:700; color:var(--moss); }
.p-pipeline .pl-deadline { color:var(--rust); }
.p-await { display:inline-block; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; color:var(--rust); background:rgba(209,107,79,0.12); padding:3px 8px; border-radius:5px; margin-top:8px; }
.empty { padding:60px 40px; text-align:center; color:var(--sage); font-size:14px; }
.section-divider { padding:8px 40px 4px; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--sage); }

@media (max-width:560px){
  .eco-header, .eco-stats, .eco-controls, .eco-grid { padding-left:20px; padding-right:20px; }
  .eco-grid { grid-template-columns:1fr; }
  .filter-label { min-width:auto; width:100%; }
}
</style>
</head>
<body>

<header class="eco-header">
  <div class="eco-header-inner">
    <div>
      <div class="eco-eyebrow">Silver <span class="brand-amp">&amp;</span> Salt Capital · CEO Tools</div>
      <div class="eco-title">Network <span>Ecosystem</span></div>
      <div class="eco-subtitle">One living graph of the people you know, who they know, what they can help with, and what you share. Tag by community, filter by skill, and see who to reconnect with.</div>
    </div>
    <a href="dashboard.html" class="eco-back">← Dashboard</a>
  </div>
</header>

<div class="eco-stats" id="stats"></div>

<div class="eco-controls">
  <input type="text" class="eco-search" id="search" placeholder="Search by name, org, skill, interest…">
  <div class="filter-row" id="commFilters"><span class="filter-label">Community</span></div>
  <div class="filter-row" id="statusFilters"><span class="filter-label">Status</span></div>
  <div class="filter-row" id="priorityFilters"><span class="filter-label">Priority</span></div>
  <div class="filter-row" id="pipelineFilters"><span class="filter-label">Pipeline</span></div>
  <div class="filter-row" id="skillFilters"><span class="filter-label">Skills</span></div>
  <div class="filter-row" id="interestFilters"><span class="filter-label">Interests</span></div>
  <div class="result-count" id="resultCount"></div>
</div>

<div class="eco-grid" id="grid"></div>

<script src="network/people.js"></script>
<script src="network/people-utah.js"></script>
<script>
// Merge all sources into one graph
const DATA = [...PEOPLE, ...(typeof UTAH_PEOPLE !== "undefined" ? UTAH_PEOPLE : [])];
const state = { search:"", community:null, status:null, skill:null, interest:null, priority:null, pipeline:null };

function initials(name){ return name.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

function buildChips(containerId, values, key, labelMap){
  const c = document.getElementById(containerId);
  values.forEach(v=>{
    const chip = document.createElement("button");
    chip.className = "chip" + (key==="community" ? " comm-"+v : "");
    chip.textContent = labelMap && labelMap[v] ? labelMap[v] : v;
    chip.onclick = ()=>{ state[key] = state[key]===v ? null : v; render(); syncActive(); };
    chip.dataset.val = v; chip.dataset.key = key;
    c.appendChild(chip);
  });
}

function syncActive(){
  document.querySelectorAll(".chip").forEach(ch=>{
    ch.classList.toggle("active", state[ch.dataset.key]===ch.dataset.val);
  });
}

function matches(p){
  if (state.community && !p.communities.includes(state.community)) return false;
  if (state.status && p.status !== state.status) return false;
  if (state.priority && p.priority !== state.priority) return false;
  if (state.pipeline === "awaiting" && !p.awaitingReply) return false;
  if (state.pipeline === "contacted" && !p.lastTouch) return false;
  if (state.pipeline === "untouched" && p.lastTouch) return false;
  if (state.skill && !(p.skills||[]).includes(state.skill)) return false;
  if (state.interest && !(p.interests||[]).includes(state.interest)) return false;
  if (state.search){
    const hay = [p.name,p.role,p.org,p.location,p.focus,p.recommendedBy,...(p.skills||[]),...(p.interests||[]),p.notes].join(" ").toLowerCase();
    if (!hay.includes(state.search.toLowerCase())) return false;
  }
  return true;
}

function card(p){
  const comms = p.communities.map(c=>`<span class="p-comm ${c}">${c==="silver-salt"?"Silver & Salt":"Monarch"}</span>`).join("");
  const prospect = p.status==="prospect" ? `<span class="p-comm prospect">Prospect</span>` : "";
  const focus = p.focus ? `<span class="tag focus">${p.focus}</span>` : "";
  const skills = (p.skills||[]).map(s=>`<span class="tag skill">${s}</span>`).join("");
  const interests = (p.interests||[]).map(i=>`<span class="tag interest">${i}</span>`).join("");
  const health = p.health ? `<span class="p-health" data-h="${p.health}" title="${p.health}"></span>` : "";
  const tags = (focus+skills+interests) ? `<div class="p-tags">${focus}${skills}${interests}</div>` : "";
  const relevance = p.priority ? `<span class="p-relevance ${p.priority.toLowerCase()}" title="${p.relevance||""}">${p.priority}</span>` : "";
  const via = p.recommendedBy ? `<div class="p-via">via ${p.recommendedBy}</div>` : "";
  const notes = p.notes ? `<div class="p-notes">${p.notes}</div>` : "";
  const conns = (p.connections||[]).length ? `<div class="p-meta">🔗 Knows ${p.connections.length} in your network</div>` : "";
  const met = p.metWhere ? `<div class="p-meta">Met: ${p.metWhere}${p.metDate?" · "+p.metDate:""}</div>` : "";
  const await_ = p.awaitingReply ? `<div><span class="p-await">⏳ Awaiting reply</span></div>` : "";
  const pipeline = (p.nextAction || p.deadline) ? `<div class="p-pipeline"><span class="pl-action">${p.nextAction||"Next step"}</span>${p.deadline?` · <span class="pl-deadline">${p.deadline}</span>`:""}${p.lastTouch?`<br>Last contact: ${p.lastTouch}`:""}</div>` : "";
  const li = p.linkedin ? `<div class="p-links"><a href="${p.linkedin}" target="_blank" rel="noopener">LinkedIn ↗</a></div>` : "";
  return `<div class="p-card">${health}
    <div class="p-top">
      <div class="p-avatar">${p.photo?`<img src="${p.photo}" alt="${p.name}">`:initials(p.name)}</div>
      <div><div class="p-name">${p.name}${relevance}</div>
        <div class="p-role">${[p.role,p.org].filter(Boolean).join(" · ")}</div>
        ${p.location?`<div class="p-loc">${p.location}</div>`:""}</div>
    </div>
    <div class="p-comms">${comms}${prospect}</div>
    ${via}${tags}${notes}${await_}${pipeline}${conns}${met}${li}
  </div>`;
}

function render(){
  const list = DATA.filter(matches);
  const grid = document.getElementById("grid");
  grid.innerHTML = list.length ? list.map(card).join("") : `<div class="empty">No one matches these filters yet. Adjust the chips, or add people as you meet them.</div>`;
  document.getElementById("resultCount").textContent = `Showing ${list.length} of ${DATA.length}`;
}

function renderStats(){
  const total = DATA.length;
  const connected = DATA.filter(p=>p.status==="connected").length;
  const monarch = DATA.filter(p=>p.communities.includes("monarch")).length;
  const ss = DATA.filter(p=>p.communities.includes("silver-salt")).length;
  const awaiting = DATA.filter(p=>p.awaitingReply).length;
  const stats = [[total,"People"],[connected,"Connected"],[monarch,"Monarch"],[ss,"Silver & Salt"],[awaiting,"Awaiting reply"]];
  document.getElementById("stats").innerHTML = stats.map(([n,l])=>`<div class="eco-stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join("");
}

// collect tags actually present in the data
const usedSkills = [...new Set(DATA.flatMap(p=>p.skills||[]))].sort();
const usedInterests = [...new Set(DATA.flatMap(p=>p.interests||[]))].sort();

buildChips("commFilters", ["monarch","silver-salt"], "community", {"monarch":"Monarch","silver-salt":"Silver & Salt"});
buildChips("statusFilters", ["connected","prospect"], "status", {"connected":"Connected","prospect":"Prospect"});
buildChips("priorityFilters", ["High","Medium"], "priority");
buildChips("pipelineFilters", ["awaiting","untouched","contacted"], "pipeline", {"awaiting":"Awaiting reply","untouched":"Not yet contacted","contacted":"Contacted"});
buildChips("skillFilters", usedSkills.length?usedSkills:["(none yet)"], "skill");
buildChips("interestFilters", usedInterests.length?usedInterests:["(none yet)"], "interest");

let searchTimer;
document.getElementById("search").addEventListener("input", e=>{
  state.search = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 140);
});
renderStats(); render();
</script>
</body>
</html>

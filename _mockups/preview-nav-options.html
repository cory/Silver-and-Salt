<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nav Options Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FBF8F2; --moss: #2F3E34; --sage: #7E8E84;
      --lime: #7CB83F; --border: #d6e8d2; --bg: #eef4ea;
    }
    body {
      font-family: 'Satoshi', sans-serif;
      background: var(--bg);
      padding: 40px 24px;
      color: var(--moss);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; font-style: italic;
      text-align: center; margin-bottom: 40px; color: var(--moss);
    }
    .label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--sage);
      text-align: center; margin-bottom: 12px;
    }
    .option { margin-bottom: 60px; }

    /* ── Option 2: Logo as link ── */
    .opt2-hero {
      background: var(--moss);
      text-align: center;
      padding: 56px 40px 52px;
      position: relative;
    }
    .opt2-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--lime) 50%, transparent 100%);
    }
    .opt2-logo-link { display: inline-block; margin-bottom: 32px; }
    .opt2-logo-link img { width: 200px; display: block; }
    .opt2-logo-link:hover { opacity: 0.8; }
    .opt2-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300; font-style: italic;
      color: #fff; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 12px;
    }
    .opt2-hero p { font-size: 14px; color: rgba(255,255,255,0.6); }
    .opt2-note {
      font-size: 11px; color: rgba(255,255,255,0.35);
      margin-top: 16px; letter-spacing: 0.04em;
    }

    /* ── Option 3: Slim nav bar ── */
    .opt3-nav {
      background: var(--moss);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .opt3-nav img { width: 140px; display: block; }
    .opt3-nav a {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border-bottom: 1px solid rgba(124,184,63,0.4);
      padding-bottom: 1px;
    }
    .opt3-nav a:hover { color: var(--lime); border-color: var(--lime); }
    .opt3-hero {
      background: var(--moss);
      text-align: center;
      padding: 40px 40px 52px;
      position: relative;
    }
    .opt3-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--lime) 50%, transparent 100%);
    }
    .opt3-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300; font-style: italic;
      color: #fff; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 12px;
    }
    .opt3-hero p { font-size: 14px; color: rgba(255,255,255,0.6); }
  </style>
</head>
